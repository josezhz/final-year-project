function parseCSV(raw) {
  const lines = raw.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(l => {
    const vals = l.split(',');
    const obj = {};
    headers.forEach((h,i) => { obj[h.trim()] = parseFloat(vals[i]); });
    return obj;
  });
}

];

let graphCount = 0;
const graphs = {};

function saveGraph(id) {
  const { chart, dsKey, enabledVars } = graphs[id];
  const canvas = document.getElementById('canvas-' + id);

  // Build a composite canvas with white background + legend
  const vars = VARIABLES.filter(v => enabledVars.has(v.key));
  const legendH = vars.length > 0 ? 28 : 0;
  const padding = 16;
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = canvas.width;
  exportCanvas.height = canvas.height + legendH + padding * 2;
  const ectx = exportCanvas.getContext('2d');

  // White background
  ectx.fillStyle = '#ffffff';
  ectx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

  // Title
  const dsLabel = DATASETS[dsKey].label;
  ectx.fillStyle = '#333333';
  ectx.font = '500 13px sans-serif';
  ectx.fillText('IMU log — ' + dsLabel, padding, padding - 2);

  // Chart image
  ectx.drawImage(canvas, 0, padding);

  // Legend row
  if (vars.length > 0) {
    let x = padding;
    const y = canvas.height + padding + 18;
    ectx.font = '11px sans-serif';
    vars.forEach(v => {
      ectx.fillStyle = v.hex;
      ectx.fillRect(x, y - 9, 10, 10);
      ectx.fillStyle = '#444444';
      ectx.fillText(v.label, x + 14, y);
      x += ectx.measureText(v.label).width + 28;
    });
  }

  const varNames = vars.length > 0
    ? vars.map(v => v.key.replace(/[^a-z0-9]/gi, '_')).slice(0, 3).join('-')
    : 'graph';
  const filename = `imu_${dsKey}_${varNames}_graph${id}.png`;

  const link = document.createElement('a');
  link.download = filename;
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
}

function addGraph(dsKey = 'A') {
  const id = ++graphCount;
  const enabledVars = new Set(['imu_pitch_deg', 'imu_roll_deg']);

  const card = document.createElement('div');
  card.className = 'graph-card';
  card.id = 'graph-' + id;

  card.innerHTML = `
    <div class="card-header">
      <div class="card-left">
        <span style="font-size:13px;font-weight:500;color:var(--color-text-secondary)">Graph ${id}</span>
        <select class="ds-select" onchange="changeDataset(${id}, this.value)">
          <option value="A" ${dsKey==='A'?'selected':''}>Log 16:13:32</option>
          <option value="B" ${dsKey==='B'?'selected':''}>Log 16:17:55</option>
        </select>
      </div>
      <div class="card-right">
        <button class="icon-btn save-btn" onclick="saveGraph(${id})" title="Save as PNG">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 1v9m0 0L5 7m3 3 3-3M2 12v1.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Save PNG
        </button>
        ${id > 1 ? `<button class="icon-btn remove-btn" onclick="removeGraph(${id})">Remove</button>` : ''}
      </div>
    </div>
    <div class="var-pills" id="pills-${id}"></div>
    <div class="chart-wrap"><canvas id="canvas-${id}" role="img" aria-label="IMU time-series chart"></canvas></div>
  `;

  document.getElementById('graphs').appendChild(card);
  renderPills(id, enabledVars);

  const ctx = document.getElementById('canvas-' + id).getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(3)}` }
        }
      },
      scales: {
        x: {
          ticks: { font: { size: 11 }, color: '#888', maxTicksLimit: 8 },
          grid: { color: 'rgba(128,128,128,0.12)' },
          title: { display: true, text: 'elapsed (s)', font: { size: 11 }, color: '#888' }
        },
        y: {
          ticks: { font: { size: 11 }, color: '#888' },
          grid: { color: 'rgba(128,128,128,0.12)' }
        }
      }
    }
  });

  graphs[id] = { chart, dsKey, enabledVars };
  updateChart(id);
}

function renderPills(id, enabledVars) {
  const container = document.getElementById('pills-' + id);
  container.innerHTML = '';
  let lastGroup = null;
  VARIABLES.forEach(v => {
    if (v.group !== lastGroup) {
      const sep = document.createElement('span');
      sep.style.cssText = 'font-size:10px;color:var(--color-text-tertiary);padding:3px 2px;align-self:center;';
      sep.textContent = v.group;
      container.appendChild(sep);
      lastGroup = v.group;
    }
    const pill = document.createElement('span');
    pill.className = 'pill' + (enabledVars.has(v.key) ? '' : ' off');
    pill.textContent = v.label;
    pill.style.cssText = `background:${v.hex}22;color:${v.hex};border-color:${v.hex}55;`;
    pill.onclick = () => toggleVar(id, v.key, pill);
    container.appendChild(pill);
  });
}

function toggleVar(id, key, pill) {
  const g = graphs[id];
  if (g.enabledVars.has(key)) { g.enabledVars.delete(key); pill.classList.add('off'); }
  else { g.enabledVars.add(key); pill.classList.remove('off'); }
  updateChart(id);
}

function changeDataset(id, dsKey) {
  graphs[id].dsKey = dsKey;
  updateChart(id);
}

function updateChart(id) {
  const { chart, dsKey, enabledVars } = graphs[id];
  const rows = DATASETS[dsKey].rows;
  const labels = rows.map(r => r.elapsed_s.toFixed(3));
  const datasets = VARIABLES
    .filter(v => enabledVars.has(v.key))
    .map(v => ({
      label: v.label,
      data: rows.map(r => r[v.key]),
      borderColor: v.hex,
      backgroundColor: v.hex + '18',
      borderWidth: 1.5,
      pointRadius: rows.length > 40 ? 0 : 2,
      tension: 0.2,
    }));
  chart.data.labels = labels;
  chart.data.datasets = datasets;
  chart.update();
}

function removeGraph(id) {
  graphs[id].chart.destroy();
  delete graphs[id];
  document.getElementById('graph-' + id).remove();
}

addGraph('A');
</script>
